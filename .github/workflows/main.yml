name: 24/7 Discord Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Bu düymə ilə əllə başlatmağa imkan verir

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install discord.py-self

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python otochat.py
        
